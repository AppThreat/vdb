name: Build and Upload distro vdb 6.7.x

on:
  schedule:
    - cron: "55 */12 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/vdb
  HF_XET_HIGH_PERFORMANCE: 1
  VDB_VERSION_TAG: v6.7.x
  VDB_STABLE_TAG: ""
  VDB_REF: master
  VDB_SQLITE_JOURNAL_MODE: off

jobs:
  distro_builder:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: alpine
            image-xz-repo: appthreat/vdbxz-alpine
            image-zst-repo: appthreat/vdbzst-alpine
            hf-path-prefix: alpine
            vuln-list-sparse-checkout: |
              alpine
              alpine-unfixed
          - name: ubuntu
            image-xz-repo: appthreat/vdbxz-ubuntu
            image-zst-repo: appthreat/vdbzst-ubuntu
            hf-path-prefix: ubuntu
            vuln-list-sparse-checkout: |
              ubuntu/2020
              ubuntu/2021
              ubuntu/2022
              ubuntu/2023
              ubuntu/2024
              ubuntu/2025
              ubuntu/2026
          - name: debian
            image-xz-repo: appthreat/vdbxz-debian
            image-zst-repo: appthreat/vdbzst-debian
            hf-path-prefix: debian
            vuln-list-sparse-checkout: |
              debian
          - name: redhat
            image-xz-repo: appthreat/vdbxz-redhat
            image-zst-repo: appthreat/vdbzst-redhat
            hf-path-prefix: redhat
            vuln-list-sparse-checkout: |
              redhat/2020
              redhat/2021
              redhat/2022
              redhat/2023
              redhat/2024
              redhat/2025
              redhat/2026
          - name: alma
            image-xz-repo: appthreat/vdbxz-alma
            image-zst-repo: appthreat/vdbzst-alma
            hf-path-prefix: alma
            vuln-list-sparse-checkout: |
              alma
          - name: rocky
            image-xz-repo: appthreat/vdbxz-rocky
            image-zst-repo: appthreat/vdbzst-rocky
            hf-path-prefix: rocky
            vuln-list-sparse-checkout: |
              rocky
    name: distro_builder (${{ matrix.name }})
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          vulnerability-db-ref: ${{ env.VDB_REF }}
          vuln-list-path: vuln-list
          vuln-list-sparse-checkout: ${{ matrix.vuln-list-sparse-checkout }}

      - uses: ./.github/actions/setup-vdb-build-tools
        with:
          install-hf-cli: "false"

      - name: Build and upload ${{ matrix.name }} db - 2020
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list
          image-xz-repo: ${{ matrix.image-xz-repo }}
          image-zst-repo: ${{ matrix.image-zst-repo }}
          version-tag: ${{ env.VDB_VERSION_TAG }}
          stable-tag: ${{ env.VDB_STABLE_TAG }}
          hf-path-prefix: ${{ matrix.hf-path-prefix }}
          upload-to-hf: "false"
          nvd-start-year: "2020"
          github-page-count: "10"
          cache-extra-args: |
            --only-aqua
          clean-workspace: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db