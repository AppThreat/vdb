name: Weekly HF Storage Cleanup

on:
  schedule:
    # Runs at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  squash-history:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.11'

      - name: Install Hugging Face Hub
        run: pip install -q huggingface_hub

      - name: Super Squash HF Dataset History
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: AppThreat/vdb
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          
          repo_id = os.environ.get('HF_REPO')
          token = os.environ.get('HF_TOKEN')
          
          if not token:
              print('Error: HF_TOKEN secret is missing.')
              exit(1)
              
          api = HfApi(token=token)
          print(f'Squashing commit history for dataset: {repo_id} to reclaim Xet storage...')
          
          try:
              api.super_squash_history(repo_id=repo_id, repo_type='dataset')
              print('Super-squash complete! Old Xet chunks are now eligible for garbage collection.')
          except Exception as e:
              print(f'Failed to squash history: {e}')
              exit(1)
          "