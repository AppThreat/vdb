name: Build and Upload vdb 6.2.x (LTS)

on:
  schedule:
    - cron: "30 */12 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/vdb
  HF_XET_HIGH_PERFORMANCE: 1
  VDB_VERSION_TAG: v6.2.x
  VDB_STABLE_TAG: ""
  VDB_REF: 'release/6.2.x'
  
jobs:
  app_2y_builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          vulnerability-db-ref: ${{ env.VDB_REF }}
          vuln-list-path: vuln-list
          vuln-list-sparse-checkout: |
            nvd/2024
            nvd/2025
            nvd/2026

      - uses: ./.github/actions/setup-vdb-build-tools
        with:
          install-hf-cli: "true"

      - name: Build and upload app db - 2024
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list
          image-xz-repo: appthreat/vdbxz-app-2y
          image-zst-repo: appthreat/vdbzst-app-2y
          hf-path-prefix: app-2y
          nvd-start-year: "2024"
          github-page-count: "10"
          app-only-mode: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true

  app_builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          vulnerability-db-ref: ${{ env.VDB_REF }}
          vuln-list-path: vuln-list
          vuln-list-sparse-checkout: |
            nvd/2020
            nvd/2021
            nvd/2022
            nvd/2023
            nvd/2024
            nvd/2025
            nvd/2026

      - uses: ./.github/actions/setup-vdb-build-tools
        with:
          install-hf-cli: "true"

      - name: Build and upload app db - 2020
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list
          image-xz-repo: appthreat/vdbxz-app
          image-zst-repo: appthreat/vdbzst-app
          hf-path-prefix: app
          nvd-start-year: "2020"
          github-page-count: "30"
          app-only-mode: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true

  app_10y_builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          vulnerability-db-ref: ${{ env.VDB_REF }}
          vuln-list-path: vuln-list
          vuln-list-sparse-checkout: |
            nvd/2016
            nvd/2017
            nvd/2018
            nvd/2019
            nvd/2020
            nvd/2021
            nvd/2022
            nvd/2023
            nvd/2024
            nvd/2025
            nvd/2026

      - uses: ./.github/actions/setup-vdb-build-tools
        with:
          install-hf-cli: "true"

      - name: Build and upload app db - 2016
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list
          image-xz-repo: appthreat/vdbxz-app-10y
          image-zst-repo: appthreat/vdbzst-app-10y
          version-tag: ${{ env.VDB_VERSION_TAG }}
          hf-path-prefix: app-10y
          nvd-start-year: "2016"
          github-page-count: "30"
          app-only-mode: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true
