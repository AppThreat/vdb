name: Build and Upload vdb 6.7.x
on:
  schedule:
    - cron: "40 */12 * * *"
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: appthreat/vdb
  HF_XET_HIGH_PERFORMANCE: 1
  VDB_VERSION_TAG: v6.7.x
  VDB_STABLE_TAG: ""
  VDB_REF: master
  VDB_SQLITE_JOURNAL_MODE: off
jobs:
  app_2y_builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          vulnerability-db-ref: ${{ env.VDB_REF }}
          vuln-list-path: vuln-list
          vuln-list-sparse-checkout: |
            nvd/2024
            nvd/2025
            nvd/2026
      - uses: ./.github/actions/setup-vdb-build-tools
        with:
          install-hf-cli: "false"
      - name: Build and upload app db - 2024
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list
          image-xz-repo: appthreat/vdbxz-app-2y
          image-zst-repo: appthreat/vdbzst-app-2y
          version-tag: ${{ env.VDB_VERSION_TAG }}
          stable-tag: ${{ env.VDB_STABLE_TAG }}
          hf-path-prefix: app-2y
          upload-to-hf: "false"
          nvd-start-year: "2024"
          github-page-count: "10"
          app-only-mode: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
        continue-on-error: true
      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          checkout-vulnerability-db: "false"
          vuln-list-path: vuln-list-extended
          vuln-list-sparse-checkout: |
            nvd/2024
            nvd/2025
            nvd/2026
      - name: Build and upload extended app db - 2024
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list-extended
          image-xz-repo: appthreat/vdbxz-app-2y-extended
          image-zst-repo: appthreat/vdbzst-app-2y-extended
          version-tag: ${{ env.VDB_VERSION_TAG }}
          stable-tag: ${{ env.VDB_STABLE_TAG }}
          hf-path-prefix: app-2y-extended
          upload-to-hf: "false"
          nvd-start-year: "2024"
          github-page-count: "10"
          app-only-mode: "true"
          include-metadata: "true"
          clean-workspace: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
        continue-on-error: true
  app_builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          vulnerability-db-ref: ${{ env.VDB_REF }}
          vuln-list-path: vuln-list
          vuln-list-sparse-checkout: |
            nvd/2020
            nvd/2021
            nvd/2022
            nvd/2023
            nvd/2024
            nvd/2025
            nvd/2026
      - uses: ./.github/actions/setup-vdb-build-tools
        with:
          install-hf-cli: "false"
      - name: Build and upload app db - 2020
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list
          image-xz-repo: appthreat/vdbxz-app
          image-zst-repo: appthreat/vdbzst-app
          version-tag: ${{ env.VDB_VERSION_TAG }}
          stable-tag: ${{ env.VDB_STABLE_TAG }}
          hf-path-prefix: app
          upload-to-hf: "false"
          nvd-start-year: "2020"
          github-page-count: "30"
          app-only-mode: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
        continue-on-error: true
      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          checkout-vulnerability-db: "false"
          vuln-list-path: vuln-list-extended
          vuln-list-sparse-checkout: |
            nvd/2020
            nvd/2021
            nvd/2022
            nvd/2023
            nvd/2024
            nvd/2025
            nvd/2026
      - name: Build and upload extended app db - 2020
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list-extended
          image-xz-repo: appthreat/vdbxz-app-extended
          image-zst-repo: appthreat/vdbzst-app-extended
          version-tag: ${{ env.VDB_VERSION_TAG }}
          stable-tag: ${{ env.VDB_STABLE_TAG }}
          hf-path-prefix: app-extended
          upload-to-hf: "false"
          nvd-start-year: "2020"
          github-page-count: "30"
          app-only-mode: "true"
          include-metadata: "true"
          clean-workspace: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
        continue-on-error: true
  app_10y_builder:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          vulnerability-db-ref: ${{ env.VDB_REF }}
          vuln-list-path: vuln-list
          vuln-list-sparse-checkout: |
            nvd/2016
            nvd/2017
            nvd/2018
            nvd/2019
            nvd/2020
            nvd/2021
            nvd/2022
            nvd/2023
            nvd/2024
            nvd/2025
            nvd/2026
      - uses: ./.github/actions/setup-vdb-build-tools
        with:
          install-hf-cli: "false"
      - name: Build and upload app db - 2016
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list
          image-xz-repo: appthreat/vdbxz-app-10y
          image-zst-repo: appthreat/vdbzst-app-10y
          version-tag: ${{ env.VDB_VERSION_TAG }}
          stable-tag: ${{ env.VDB_STABLE_TAG }}
          hf-path-prefix: app-10y
          upload-to-hf: "false"
          nvd-start-year: "2016"
          github-page-count: "30"
          app-only-mode: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
        continue-on-error: true
      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          checkout-vulnerability-db: "false"
          vuln-list-path: vuln-list-extended
          vuln-list-sparse-checkout: |
            nvd/2016
            nvd/2017
            nvd/2018
            nvd/2019
            nvd/2020
            nvd/2021
            nvd/2022
            nvd/2023
            nvd/2024
            nvd/2025
            nvd/2026
      - name: Build and upload extended app db - 2016
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: vuln-list-extended
          image-xz-repo: appthreat/vdbxz-app-10y-extended
          image-zst-repo: appthreat/vdbzst-app-10y-extended
          version-tag: ${{ env.VDB_VERSION_TAG }}
          stable-tag: ${{ env.VDB_STABLE_TAG }}
          hf-path-prefix: app-10y-extended
          upload-to-hf: "false"
          nvd-start-year: "2016"
          github-page-count: "30"
          app-only-mode: "true"
          include-metadata: "true"
          clean-workspace: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
        continue-on-error: true
  os_builder:
    runs-on: [self-hosted-ubuntu, linux]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app-os
            vuln-list-path: vuln-list
            image-xz-repo: appthreat/vdbxz
            image-zst-repo: appthreat/vdbzst
            hf-path-prefix: app-os
            nvd-start-year: "2020"
            github-page-count: "10"
            include-metadata: "false"
            clean-workspace: "false"
          - name: app-os-extended
            vuln-list-path: vuln-list
            image-xz-repo: appthreat/vdbxz-extended
            image-zst-repo: appthreat/vdbzst-extended
            hf-path-prefix: app-os-extended
            nvd-start-year: "2020"
            github-page-count: "10"
            include-metadata: "true"
            clean-workspace: "true"
          - name: app-os-10y
            vuln-list-path: vuln-list
            image-xz-repo: appthreat/vdbxz-10y
            image-zst-repo: appthreat/vdbzst-10y
            hf-path-prefix: app-os-10y
            nvd-start-year: "2016"
            github-page-count: "20"
            include-metadata: "false"
            clean-workspace: "true"
          - name: app-os-10y-extended
            vuln-list-path: vuln-list
            image-xz-repo: appthreat/vdbxz-10y-extended
            image-zst-repo: appthreat/vdbzst-10y-extended
            hf-path-prefix: app-os-10y-extended
            nvd-start-year: "2016"
            github-page-count: "20"
            include-metadata: "true"
            clean-workspace: "true"
    name: os_builder (${{ matrix.name }})
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/checkout-vdb-dependencies
        with:
          vulnerability-db-ref: ${{ env.VDB_REF }}
          vuln-list-path: ${{ matrix.vuln-list-path }}
      - uses: ./.github/actions/setup-vdb-build-tools
        with:
          setup-python: "false"
          python-executable: python3
          run-trim: "false"
          install-hf-cli: "false"
          enable-break-system-packages: "true"
          dependency-install-extra-args: --no-warn-script-location
      - name: Build and upload ${{ matrix.name }} db
        uses: ./.github/actions/build-and-upload-vdb6
        with:
          vuln-list-path: ${{ matrix.vuln-list-path }}
          image-xz-repo: ${{ matrix.image-xz-repo }}
          image-zst-repo: ${{ matrix.image-zst-repo }}
          version-tag: ${{ env.VDB_VERSION_TAG }}
          stable-tag: ${{ env.VDB_STABLE_TAG }}
          hf-path-prefix: ${{ matrix.hf-path-prefix }}
          upload-to-hf: "false"
          nvd-start-year: ${{ matrix.nvd-start-year }}
          github-page-count: ${{ matrix.github-page-count }}
          python-executable: python3
          include-metadata: ${{ matrix.include-metadata }}
          clean-workspace: ${{ matrix.clean-workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
          PYTHONPATH: vulnerability-db
